<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>回答 | TimeGrid Scheduler</title><link rel="stylesheet" href="css/style.css"></head>
<body><header class="header"><div class="container nav"><a class="logo" href="index.html">TimeGrid Scheduler</a><div class="nav-links"><a id="adminLink" href="#">管理画面</a></div></div></header>
<main class="container"><div id="message"></div><section id="eventArea" class="card"></section><section id="summaryArea" class="card"></section><section id="responsesArea" class="card"></section><section id="commentsArea" class="card"></section></main>
<div id="responseModal" class="modal-backdrop"><div class="modal"><div class="actions" style="justify-content:space-between"><h2>回答を追加・更新する</h2><button class="btn secondary small" id="closeModalBtn">閉じる</button></div><form id="responseForm"><input type="hidden" id="responseId"><div class="grid two"><div class="form-row"><label for="name">名前</label><input id="name" required maxlength="60"></div><div class="form-row"><label for="editPassword">回答編集用パスワード</label><input id="editPassword" type="password" required minlength="4"></div></div><div class="form-row"><label for="comment">コメント</label><textarea id="comment"></textarea></div><div class="form-row"><label>回答マーク</label><div class="mark-picker" id="markPicker"></div><p class="help">マークを選んでから、候補時間をクリックまたはドラッグしてください。未入力セルは空欄のまま保存します。</p></div><div id="answerTimeline" class="timeline-wrap"></div><div class="actions"><button class="btn" type="submit">回答を登録する</button></div></form></div></div>
<script src="js/config.js"></script><script src="js/api.js"></script><script src="js/event.js"></script></body></html>
