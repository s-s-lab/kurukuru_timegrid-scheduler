<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>作成 | Kurukuru -時間単位日程調整ツール-</title><link rel="stylesheet" href="css/style.css"></head>
<body><header class="header compact-header"><div class="container nav"><a class="logo" href="index.html">Kurukuru -時間単位日程調整ツール-</a><div class="nav-links"><a href="index.html">トップ</a></div></div></header>
<main class="container compact-page">
  <div id="message"></div>
  <form id="createForm">
    <div class="create-layout">
      <section class="step-panel basic-panel">
        <div class="step-title">STEP 1 → 基本情報を入力</div>
        <div class="step-body compact-form">
          <div class="form-row inline-row"><label for="title">イベント名</label><input id="title" required maxlength="100" placeholder="例）次回打合せ"></div>
          <div class="form-row inline-row"><label for="organizerEmail">主催者メール</label><input id="organizerEmail" type="email" required placeholder="example@example.com"></div>
          <div class="form-row inline-row"><label for="description">補足・備考</label><textarea id="description" placeholder="参加者への連絡事項など"></textarea></div>
          <div class="form-row inline-row"><label for="adminPassword">管理パスワード</label><input id="adminPassword" type="password" required minlength="4"><p class="inline-help">受付停止・削除・決定日時登録に使用</p></div>
        </div>
      </section>

      <section class="step-panel calendar-panel">
        <div class="step-title">STEP 2 → 日付を選択</div>
        <div class="step-body">
          <div id="monthCalendars" class="month-calendars"></div>
          <div class="calendar-nav"><button type="button" class="link-btn" id="prevMonthBtn">‹ 前の月</button><button type="button" class="btn mini secondary" id="todayBtn">今日</button><button type="button" class="link-btn" id="nextMonthBtn">次の月 ›</button></div>
          <div class="selected-date-line"><strong>選択中：</strong><span id="selectedDateSummary">なし</span></div>
        </div>
      </section>
    </div>

    <section class="step-panel time-panel">
      <div class="step-title">STEP 3 → 時間を選択</div>
      <div class="step-body">
        <p class="help compact-help">白いセルをクリックまたはドラッグして、候補時間を選択・解除できます。</p>
        <div class="time-toolbar">
          <select id="bulkStart"></select><span>〜</span><select id="bulkEnd"></select><span>まで</span><button type="button" class="link-btn" id="bulkApplyBtn">一括設定する</button><span>|</span><button type="button" class="link-btn" id="resetBtn">全てリセット</button>
        </div>
        <div id="timelines" class="compact-timeline-wrap"></div>
        <div class="submit-row"><button class="btn register-btn" type="submit">登録</button></div>
      </div>
    </section>
  </form>
</main><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/create.js"></script></body></html>
